# Turnkey Streamable HTTP deployment of jellyfin-mcp.
#
#   1. Create a .env file next to this one:
#        JELLYFIN_URL=https://jellyfin_host:8920
#        JELLYFIN_API_KEY=your_api_key
#        HTTP_TOKEN=a_long_random_secret
#   2. docker compose up -d
#
# The MCP endpoint is then at http://127.0.0.1:8080/mcp (send
# `Authorization: Bearer <HTTP_TOKEN>`); /health is unauthenticated for monitoring.
# Compose refuses to start until JELLYFIN_API_KEY and HTTP_TOKEN are set.
#
# To expose beyond localhost, change the published port to "8080:8080" and put it
# behind a reverse proxy with TLS.

services:
  jellyfin-mcp:
    image: ghcr.io/jaredtrent/jellyfin-mcp:latest
    # To build from source instead of pulling the published image:
    # build: .
    container_name: jellyfin-mcp
    restart: unless-stopped
    # Published on loopback only by default.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JELLYFIN_URL: "${JELLYFIN_URL:?set JELLYFIN_URL in .env}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY:?set JELLYFIN_API_KEY in .env}"
      # JELLYFIN_USER_ID: "${JELLYFIN_USER_ID:-}"  # optional — auto-detected
    command:
      - "--http"
      - "--addr"
      - "0.0.0.0:8080"
      - "--http-token"
      - "${HTTP_TOKEN:?set HTTP_TOKEN in .env}"
    # Hardening — the server is a single static binary that writes nothing to disk.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
